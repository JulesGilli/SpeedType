<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13111c"/>
      <stop offset="0.55" stop-color="#0f0f17"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </linearGradient>
    <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowK" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid subtil -->
  <g fill="#ffffff" opacity="0.04">
    <!-- généré: petite grille de points -->
    <g>
      <circle cx="60"  cy="60"  r="2"/><circle cx="160" cy="60"  r="2"/><circle cx="260" cy="60"  r="2"/><circle cx="360" cy="60"  r="2"/><circle cx="460" cy="60"  r="2"/><circle cx="560" cy="60"  r="2"/><circle cx="660" cy="60"  r="2"/><circle cx="760" cy="60"  r="2"/><circle cx="860" cy="60"  r="2"/><circle cx="960" cy="60"  r="2"/><circle cx="1060" cy="60" r="2"/><circle cx="1160" cy="60" r="2"/>
      <circle cx="60"  cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="260" cy="160" r="2"/><circle cx="360" cy="160" r="2"/><circle cx="460" cy="160" r="2"/><circle cx="560" cy="160" r="2"/><circle cx="660" cy="160" r="2"/><circle cx="760" cy="160" r="2"/><circle cx="860" cy="160" r="2"/><circle cx="960" cy="160" r="2"/><circle cx="1060" cy="160" r="2"/><circle cx="1160" cy="160" r="2"/>
      <circle cx="60"  cy="560" r="2"/><circle cx="160" cy="560" r="2"/><circle cx="260" cy="560" r="2"/><circle cx="360" cy="560" r="2"/><circle cx="460" cy="560" r="2"/><circle cx="560" cy="560" r="2"/><circle cx="660" cy="560" r="2"/><circle cx="760" cy="560" r="2"/><circle cx="860" cy="560" r="2"/><circle cx="960" cy="560" r="2"/><circle cx="1060" cy="560" r="2"/><circle cx="1160" cy="560" r="2"/>
    </g>
  </g>

  <!-- Halos lumineux -->
  <ellipse cx="250" cy="180" rx="420" ry="360" fill="url(#glowP)"/>
  <ellipse cx="980" cy="500" rx="420" ry="360" fill="url(#glowK)"/>

  <!-- Tag / pill -->
  <g transform="translate(100,150)">
    <rect x="0" y="0" width="186" height="44" rx="22" fill="#ffffff" opacity="0.05"/>
    <rect x="0" y="0" width="186" height="44" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="26" cy="22" r="5" fill="#34d399"/>
    <text x="44" y="29" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#e9e6f5" letter-spacing="0.5">Typing game</text>
  </g>

  <!-- Titre -->
  <text x="98" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="132" font-weight="800" fill="url(#title)" letter-spacing="-2">SpeedType</text>

  <!-- Sous-titre -->
  <text x="102" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="500" fill="#b8b3cc">Teste ta vitesse de frappe. 5 langues, plusieurs modes.</text>

  <!-- Faux champ de frappe (glassmorphism) -->
  <g transform="translate(100,452)">
    <rect x="0" y="0" width="720" height="92" rx="18" fill="#ffffff" opacity="0.05"/>
    <rect x="0" y="0" width="720" height="92" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="36" y="58" font-family="Consolas, Menlo, monospace" font-size="40" font-weight="600" fill="#ffffff">the quick brown</text>
    <rect x="362" y="26" width="4" height="44" rx="2" fill="#ec4899"/>
    <text x="384" y="58" font-family="Consolas, Menlo, monospace" font-size="40" font-weight="600" fill="#6b6680">fox</text>
  </g>

  <!-- Bouton Start -->
  <g transform="translate(860,452)">
    <rect x="0" y="0" width="240" height="92" rx="18" fill="url(#btn)"/>
    <text x="120" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">Commencer</text>
  </g>

  <!-- WPM stat -->
  <g transform="translate(860,150)" text-anchor="end">
    <text x="240" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#8b86a0" letter-spacing="2">VITESSE</text>
    <text x="240" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" fill="#ffffff">120<tspan font-size="34" font-weight="600" fill="#a855f7"> WPM</tspan></text>
  </g>
</svg>
